<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floast - Dashboard</title>
  <link rel="stylesheet" href="../css/colors.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <!-- ── Header ─────────────────────────────────────── -->
  <header class="dash-header">
    <div class="header-user">
      <button class="avatar" id="avatarBtn" aria-label="Perfil de usuario">
        <span class="avatar-initials" id="avatarInitials">JR</span>
      </button>
      <div class="header-user-info">
        <p class="user-name" id="userName">Juan Ramírez</p>
        <p class="user-role">Administrador · Gestión de Propiedades</p>
      </div>
    </div>

    <div class="header-actions">
      <div class="search-wrapper">
        <i data-lucide="search" class="search-icon"></i>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Buscar propiedad…"
          autocomplete="off"
        >
      </div>
      <button class="btn-new-property" id="btnNewProperty">
        <i data-lucide="plus"></i>
        <span>Nueva Propiedad</span>
      </button>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────── -->
  <main class="dash-main">
    <h2 class="section-title">Mis Propiedades</h2>

    <!-- Grid de propiedades -->
    <div class="properties-grid" id="propertiesGrid">
      <!-- Las tarjetas se generan desde dashboard.js -->

      <!-- Tarjeta agregar — siempre al final -->
      <button class="card-add" id="btnAddCard" aria-label="Agregar propiedad">
        <i data-lucide="plus-circle" class="card-add-icon"></i>
        <span>Agregar propiedad</span>
      </button>
    </div>

    <!-- Estado vacío (sin propiedades) -->
    <div class="empty-state" id="emptyState" hidden>
      <i data-lucide="building-2" class="empty-icon"></i>
      <p class="empty-title">Aún no tienes propiedades</p>
      <p class="empty-sub">Agrega tu primera propiedad para comenzar a gestionar tus rentas.</p>
      <button class="btn-new-property" id="btnEmptyNew">
        <i data-lucide="plus"></i>
        <span>Nueva Propiedad</span>
      </button>
    </div>
  </main>

  <!-- ── Modal: Nueva / Editar propiedad ───────────── -->
  <div class="modal-overlay" id="modalProperty" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Nueva Propiedad</h3>
        <button class="modal-close" id="modalClose" aria-label="Cerrar">
          <i data-lucide="x"></i>
        </button>
      </div>

      <form id="propertyForm" class="modal-form" novalidate>
        <input type="hidden" id="propertyId">

        <div class="form-row">
          <div class="form-group">
            <label for="propName">Nombre de la propiedad</label>
            <input type="text" id="propName" placeholder="Ej. Casa las Torres" required>
            <span class="error-message" id="propNameError"></span>
          </div>

          <div class="form-group">
            <label for="propType">Tipo</label>
            <select id="propType" required>
              <option value="" disabled selected>Selecciona tipo</option>
              <option value="casa">Casa</option>
              <option value="departamento">Departamento</option>
              <option value="cuarto">Cuarto / Habitación</option>
              <option value="condominio">Condominio</option>
              <option value="edificio">Edificio</option>
              <option value="local">Local comercial</option>
            </select>
            <span class="error-message" id="propTypeError"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="propLocation">Ubicación / Colonia</label>
            <input type="text" id="propLocation" placeholder="Ej. Col. Centro" required>
            <span class="error-message" id="propLocationError"></span>
          </div>

          <div class="form-group">
            <label for="propUnits">Número de unidades / habitaciones</label>
            <input type="number" id="propUnits" placeholder="Ej. 3" min="1" required>
            <span class="error-message" id="propUnitsError"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="propPrice">Renta mensual ($)</label>
            <input type="number" id="propPrice" placeholder="Ej. 8500" min="0" required>
            <span class="error-message" id="propPriceError"></span>
          </div>

          <div class="form-group">
            <label for="propStatus">Estado</label>
            <select id="propStatus" required>
              <option value="" disabled selected>Selecciona estado</option>
              <option value="disponible">Disponible</option>
              <option value="rentada">Rentada</option>
              <option value="mantenimiento">En mantenimiento</option>
            </select>
            <span class="error-message" id="propStatusError"></span>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="modalCancel">Cancelar</button>
          <button type="submit" class="btn-submit" id="modalSubmit">Guardar Propiedad</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Modal: Confirmar eliminar ─────────────────── -->
  <div class="modal-overlay" id="modalDelete" hidden>
    <div class="modal modal-sm" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 class="modal-title">Eliminar propiedad</h3>
        <button class="modal-close" id="deleteClose" aria-label="Cerrar">
          <i data-lucide="x"></i>
        </button>
      </div>
      <p class="delete-text">
        ¿Estás seguro de que quieres eliminar
        <strong id="deletePropName"></strong>?
        Esta acción no se puede deshacer.
      </p>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="deleteCancel">Cancelar</button>
        <button type="button" class="btn-danger" id="deleteConfirm">Sí, eliminar</button>
      </div>
    </div>
  </div>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script type="module" src="../scripts/dashboard.js"></script>
</body>
</html>
