<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floast - Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <div class="login-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>DOMI</h1>
                <p>Gestiona tus propiedades</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Correo Electrónico</label>
                    <input type="email" id="loginEmail" name="email" placeholder="tu@email.com" required>
                    <span class="error-message" id="loginEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="loginPassword" name="password" placeholder="Contraseña" required>
                        <button type="button" class="toggle-password" id="toggleLoginPassword">
                            👁️
                        </button>
                    </div>
                    <span class="error-message" id="loginPasswordError"></span>
                </div>

                <button type="submit" class="btn-submit">Iniciar Sesión</button>
            </form>

            <div class="auth-divider">
                <span>¿No tienes cuenta?</span>
            </div>

            <a href="new_user.html" class="btn-link">Crear una cuenta</a>

            <a href="recover.html" class="btn-recover">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

<script type="module" src="../scripts/login.js"></script>
</body>

</html>
